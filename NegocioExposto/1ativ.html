<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Componentes em Bootstrap</title>
</head>

<body>
    <h1 class="text-primary">Componentes em Bootstrap</h1>
    <!-- Menu de navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Logo</a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav"> // um do lado do outro
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            id="dropPortfolio">Portfólio</a>
                        <ul class="dropdown-menu ">
                            <li class="nav-item">
                                <a class="dropdown-item" href="#">Web Desing</a>
                            </li>
                            <li class="nav-item">
                                <a class="dropdown-item" href="#">Desenvolvimento</a>
                            </li>
                        </ul>
                    </li>
                    <!-- Crie 3 itens de menu a mais:
                     Web desing, desenvolvimento, contato e sobre  -->


                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sobre</a>
                    </li>
                </ul>
            </div>
        </div>
        <form class="me-2 d-flex">
            <input class="form-control me-2" type="text" placeholder="Buscar">
            <button class="btn bg-secondary text-white me-2" type="button">Buscar</button>
            <button type="button" class="btn btn-primary me-2">Notificações <span class="badge bg-danger">18</span></button>
        </form>
    </nav>


    <!-- Badges -->
    <div class="m-5">
        <span class="badge rounded-pill bg-p bg-secondary">Java</span>
        <span class="badge rounded-pill bg-p bg-primary">Java Script</span>
        <span class="badge rounded-pill bg-p bg-success">Phyton</span>
        <span class="badge rounded-pill bg-p bg-danger">Mysql</span>
        <span class="badge rounded-pill bg-p bg-info">Css</span>
       
    </div>
    <div>
        <div class="accordion m-5" id="accordionExample">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                        1-
                    </button>
                </h2>
                <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                    <div class="accordion-body">


                        <code>Jesus te ama</code>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                        2-
                    </button>
                </h2>
                <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                    <div class="accordion-body">
                        <strong> <code>Volte para ele</code>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                        3-
                    </button>
                </h2>
                <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                    <div class="accordion-body">
                        <code>Ele te espera</code>


                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

        <script src="bootstrap.bundle.js"></script>
</body>


</html>
